patterns:
  - id: "RAVEN-001"
    name: "Steganographic output injection via images"
    category: "prompt-injection"
    severity: "high"
    description: "Vision-language models can be manipulated through steganographically hidden text in images that forces specific output generation."
    detection:
      strategy: "Look for image processing in LLM pipelines without steganographic content validation"
      regex: "vision_model|image_input|process_image"
      ast_pattern: "Vision model API calls without steganographic detection"
      indicators: ["vision model", "image input", "no steganographic filtering", "VLM processing"]
    real_examples:
      - source: "arXiv:2507.22304"
        project: "GPT-4V, Claude Vision, Gemini Vision"
        finding_id: "STEGO-VLM-2024"
        impact: "99.2% attack success rate for forced output generation across major VLMs"
        amount_lost: "Model integrity compromise"
        code_vulnerable: |
          // Vulnerable: Direct image processing without validation
          const response = await openai.chat.completions.create({
            model: "gpt-4-vision-preview",
            messages: [{
              role: "user",
              content: [
                {type: "text", text: "Analyze this image"},
                {type: "image_url", image_url: {url: user_image}} // Contains hidden text
              ]
            }]
          });
        code_fixed: |
          // Fixed: Steganographic detection before processing
          const stego_detected = await detectSteganography(user_image);
          if (stego_detected.confidence > 0.7) {
            throw new Error("Potentially manipulated image detected");
          }
          
          const response = await openai.chat.completions.create({
            model: "gpt-4-vision-preview",
            messages: [/* safe processing */]
          });
    false_positive_notes: "False positives can occur with naturally noisy images or compressed formats that appear steganographic"
    tags: ["ai-security", "prompt-injection", "vision-models", "steganography", "llm-security"]
    added_date: "2026-02-09"
    confidence: "high"

  - id: "RAVEN-002"
    name: "Context window manipulation for instruction displacement"
    category: "context-poisoning"
    severity: "medium"
    description: "Long context models can have safety instructions displaced through context overflow attacks with gradual trust building."
    detection:
      strategy: "Look for systems that don't track instruction displacement in long contexts or lack context integrity checks"
      regex: "context_window|max_tokens|conversation_history"
      ast_pattern: "Long context processing without instruction anchoring or integrity validation"
      indicators: ["long context", "context overflow", "instruction displacement", "gradual poisoning"]
    real_examples:
      - source: "Anthropic Many-Shot Jailbreaking study"
        project: "Claude, GPT-4, various LLMs"
        finding_id: "MANY-SHOT-2024"
        impact: "Systematic safety instruction bypass through context manipulation"
        amount_lost: "Model safety compromise"
        code_vulnerable: |
          // Vulnerable: No context integrity tracking
          const full_context = system_prompt + conversation_history + user_input;
          if (full_context.length > MAX_CONTEXT) {
            // Truncates from beginning, potentially removing safety instructions
            full_context = full_context.slice(-MAX_CONTEXT);
          }
        code_fixed: |
          // Fixed: Preserve critical instructions and detect manipulation
          const preserved_instructions = extractCriticalInstructions(system_prompt);
          const safe_context = buildSafeContext(
            preserved_instructions, 
            conversation_history, 
            user_input,
            MAX_CONTEXT
          );
          // Monitor for instruction displacement attempts
          if (detectContextManipulation(conversation_history)) {
            logSecurityEvent("Context manipulation detected");
          }
    false_positive_notes: "Normal context management for efficiency may trigger false positives when not malicious"
    tags: ["ai-security", "context-manipulation", "instruction-displacement", "many-shot", "safety-bypass"]
    added_date: "2026-02-09"
    confidence: "medium"