id: LEARNED-016
source_contest: wildcat-2024-08
official_finding: "M-05 (#57)"
category: access-control
severity: medium
title: "Two-step credential bypass: set higher expiry then lower it"

detection_signal: |
  Access control where credential updates are gated by "caller must be previous
  grantor OR new value must be better than old." The two-step attack pattern:
  first become the grantor via a minimal improvement, then use grantor privilege
  to degrade the credential. Any system where (1) improving a value changes who
  is authorized to modify it, and (2) the authorized modifier can then set any value.

code_pattern: |
  function grantRole(address account, uint32 expiry) external {
      RoleData storage role = _roles[account];

      // Check 1: caller is the previous provider → can set ANY expiry
      // Check 2: new expiry > old expiry → anyone can "improve" the credential
      if (msg.sender != role.lastProvider && expiry <= role.expiry) {
          revert NotApprovedProvider();
      }

      role.expiry = expiry;
      role.lastProvider = msg.sender;  // attacker becomes lastProvider
  }

  // Attack sequence by provider B against provider A's credential:
  // Step 1: B calls grantRole(victim, A_expiry + 1)
  //   → passes check #2 (new expiry > old), B becomes lastProvider
  // Step 2: B calls grantRole(victim, 1)
  //   → passes check #1 (B == lastProvider), sets near-zero expiry
  //   → provider A's credential is effectively revoked

check: |
  1. Identify any access control function where updates have dual authorization paths
  2. Check if one path (e.g., "value improvement") changes the authorized entity
  3. Check if the other path (e.g., "caller is last modifier") allows unrestricted changes
  4. Simulate two-step attack:
     a. Call with minimal improvement to become the authorized entity
     b. Call again using the new authority to degrade the value
  5. Verify: can an unauthorized party effectively revoke or reduce another provider's credential?
  6. The fix: require both conditions (caller is provider AND new value is valid) or
     separate the authorization from the value-improvement path

why_missed: |
  Analyzed grantRole's individual checks but didn't simulate multi-call attack
  sequences. Focused on single-transaction analysis. The two-step bypass requires
  thinking about state changes BETWEEN calls — first call changes lastProvider,
  second call exploits it. Lesson: for any function that updates authorization
  state as a side effect, always simulate what happens when it's called twice
  by different actors.
